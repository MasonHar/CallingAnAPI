<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends — Bootstrap</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="h2 mb-3">Friends</h1>

    <div id="alertArea" class="mb-3"></div>

    <div class="table-responsive shadow-sm bg-white rounded">
      <table class="table table-striped table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th scope="col">Full name</th>
            <th scope="col">ID</th>
          </tr>
        </thead>
        <tbody id="friendsTableBody"></tbody>
      </table>
    </div>

    <div id="friendDetail" class="card mt-4 d-none">
      <div class="card-header">Friend details</div>
      <div class="card-body">
        <pre id="friendDetailJson" class="mb-0 small bg-body-secondary p-3 rounded"></pre>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script>
    const DATA_API = "https://friends-node-01-47e26a48b0b0.herokuapp.com/friends";
    const PROFILE_BASE = "https://api.com/friends";

    const tableBody = document.getElementById("friendsTableBody");
    const alertArea = document.getElementById("alertArea");
    const friendDetail = document.getElementById("friendDetail");
    const friendDetailJson = document.getElementById("friendDetailJson");

    function showAlert(type, message) {
      alertArea.innerHTML = `<div class="alert alert-${type} mb-0" role="alert">${message}</div>`;
    }

    function clearAlert() {
      alertArea.innerHTML = "";
    }

    function fullName(f) {
      return `${f.firstName} ${f.lastName}`.trim();
    }

    function profileUrl(id) {
      return `${PROFILE_BASE}/${id}`;
    }

    async function showFriendInline(id) {
      clearAlert();
      friendDetail.classList.add("d-none");
      try {
        const response = await fetch(`${DATA_API}/${id}`);
        if (response.status === 404) {
          showAlert("warning", `No friend with ID ${id}.`);
          return;
        }
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const friend = await response.json();
        friendDetailJson.textContent = JSON.stringify(friend, null, 2);
        friendDetail.classList.remove("d-none");
        friendDetail.scrollIntoView({ behavior: "smooth", block: "nearest" });
      } catch (err) {
        showAlert("danger", `Could not load friend: ${err.message}`);
      }
    }

    function renderRows(friends) {
      tableBody.innerHTML = "";
      friends.forEach((f) => {
        const tr = document.createElement("tr");
        const nameTd = document.createElement("td");
        const idTd = document.createElement("td");

        const link = document.createElement("a");
        link.href = profileUrl(f.id);
        link.textContent = fullName(f);
        link.addEventListener("click", (e) => {
          e.preventDefault();
          showFriendInline(f.id);
        });

        nameTd.appendChild(link);
        idTd.textContent = f.id;
        tr.appendChild(nameTd);
        tr.appendChild(idTd);
        tableBody.appendChild(tr);
      });
    }

    async function init() {
      clearAlert();
      try {
        const response = await fetch(DATA_API);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const friends = await response.json();
        if (!Array.isArray(friends) || friends.length === 0) {
          showAlert("info", "No friends returned from the API.");
          return;
        }
        renderRows(friends);
      } catch (err) {
        showAlert("danger", `Failed to load friends: ${err.message}`);
      }
    }

    init();
  </script>
</body>
</html>
